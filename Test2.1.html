<!-- The Search Input -->
<input type="text" id="mySearchInput" oninput="liveSearch()" placeholder="Search..." style="width:100%; padding:12px; font-size:16px;">

<!-- The List to Search -->
<ul id="mySearchList" style="list-style-type:none; padding:0;">
    <li style="padding:10px; border-bottom:1px solid #ddd;">Apple</li>
    <li style="padding:10px; border-bottom:1px solid #ddd;">Banana</li>
    <li style="padding:10px; border-bottom:1px solid #ddd;">Cherry</li>
    <li style="padding:10px; border-bottom:1px solid #ddd;">Date</li>
</ul>

<script>
function liveSearch() {
    let input = document.getElementById('mySearchInput').value.toLowerCase();
    let ul = document.getElementById('mySearchList');
    let li = ul.getElementsByTagName('li');

    for (let i = 0; i < li.length; i++) {
        let text = li[i].textContent || li[i].innerText;
        if (text.toLowerCase().indexOf(input) > -1) {
            li[i].style.display = "";
        } else {
            li[i].style.display = "none";
        }
    }
}
</script>
